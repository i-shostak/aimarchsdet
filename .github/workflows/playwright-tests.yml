name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CI: true

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Node.js LTS with Yarn cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies using Yarn in immutable/CI mode
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Cache Playwright browser binaries to avoid re-downloading on every run
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      # Install Playwright browsers along with system dependencies
      - name: Install Playwright browsers
        run: yarn playwright install chromium --with-deps

      # Run tests from tests/e2e (root config)
      - name: Run Playwright tests (main)
        run: yarn playwright test

      # Preserve main test output before running the second suite
      - name: Move main test output
        if: always()
        run: |
          mv playwright-report playwright-report-main || true
          mv test-results test-results-main || true

      # Run tests from ai.test.maintenance/tests
      - name: Run Playwright tests (ai.test.maintenance)
        if: always()
        run: yarn playwright test --config=ai.test.maintenance/playwright.config.ts

      # Upload HTML report for main tests
      - name: Upload HTML report (main)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-main
          path: playwright-report-main

      # Upload HTML report for ai.test.maintenance tests
      - name: Upload HTML report (ai.test.maintenance)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-ai
          path: playwright-report

      # Upload Playwright traces for main tests
      - name: Upload traces (main)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-main
          path: test-results-main/**/trace*.zip

      # Upload Playwright traces for ai.test.maintenance tests
      - name: Upload traces (ai.test.maintenance)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-ai
          path: test-results/**/trace*.zip

      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"summary\": \"Playwright Tests Failed\",
            \"themeColor\": \"FF0000\",
            \"title\": \"Playwright Tests Failed\",
            \"sections\": [{
              \"facts\": [
                { \"name\": \"PR Title\", \"value\": \"${{ github.event.pull_request.title }}\" },
                { \"name\": \"Author\", \"value\": \"${{ github.event.pull_request.user.login }}\" },
                { \"name\": \"Branch\", \"value\": \"${{ github.head_ref }}\" },
                { \"name\": \"Workflow Run\", \"value\": \"[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\" }
              ]
            }]
          }" ${{ secrets.TEAMS_WEBHOOK_URL }}

      # --------------- GitHub Pages publishing (main branch only) ---------------

      - name: Prepare history.json
        if: always() && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p playwright-report

          # Fetch existing history from the gh-pages branch, if it exists.
          EXISTING_JSON="[]"
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            TMPDIR=$(mktemp -d)
            git clone --depth 1 --branch gh-pages \
              "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
              "$TMPDIR" 2>/dev/null || true
            if [ -f "$TMPDIR/history.json" ] && \
               node -e "JSON.parse(require('fs').readFileSync('$TMPDIR/history.json','utf8'))" 2>/dev/null; then
              EXISTING_JSON=$(cat "$TMPDIR/history.json")
            fi
            rm -rf "$TMPDIR"
          fi
          export EXISTING_JSON

          # Append a new record and write the merged array back.
          node - <<'JSEOF'
          const fs = require('fs');
          let history;
          try   { history = JSON.parse(process.env.EXISTING_JSON); }
          catch { history = []; }
          if (!Array.isArray(history)) history = [];

          history.push({
            timestamp : new Date().toISOString(),
            runUrl    : process.env.RUN_URL,
            commitSha : process.env.COMMIT_SHA,
            ref       : process.env.REF,
            branch    : process.env.BRANCH
          });

          fs.writeFileSync('playwright-report/history.json', JSON.stringify(history, null, 2));
          console.log('history.json written with', history.length, 'record(s).');
          JSEOF
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          BRANCH: ${{ github.ref_name }}

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

  deploy-pages:
    needs: playwright-tests
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      - name: Run yarn audit
        id: audit
        run: |
          yarn audit --level high --json > audit-report.json 2>&1 || true

      - name: Write audit summary
        if: always()
        run: |
          echo "## Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          if [ ! -s audit-report.json ]; then
            echo "No output from audit." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          HIGH=$(grep -c '"severity":"high"' audit-report.json || true)
          CRITICAL=$(grep -c '"severity":"critical"' audit-report.json || true)
          TOTAL=$((HIGH + CRITICAL))
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| High     | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          if [ "$TOTAL" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> :x: $TOTAL high/critical vulnerabilit(ies) detected. Blocking PR." >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> :white_check_mark: No high or critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail on high or critical vulnerabilities
        run: yarn audit --level high
